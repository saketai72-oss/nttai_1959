<!doctype html>
<html lang="en">
  <head>
    <title>Playfair Cipher</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <table class="table">
        <tr>
          <td style="text-align: center; font-weight: bold; font-size: 25px">
            playfair CIPHER
          </td>
        </tr>
        <tr>
          <td style="font-weight: bold; color: darkorange">
            GENERATE PLAYFAIR KEY
          </td>
        </tr>
        <tr>
          <td>
            <form method="POST" action="/playfair/create_playfair_matrix">
              <div class="mb-3">
                <label class="form-label">Nhập Key để tạo ma trận:</label>
                <input
                  type="text"
                  class="form-control"
                  name="inputKeyMatrix"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary">Tạo Ma Trận</button>
              <div class="mt-3">
                <label class="form-label text-primary font-weight-bold"
                  >Ma trận Playfair:</label
                >
                <textarea
                  class="form-control font-weight-bold text-primary"
                  rows="6"
                  style="background-color: #f8f9fa"
                  readonly
                >
{% if action == 'create_matrix' %}Raw key: {{ key }}
Cleaned key: {{ cleaned_key }}
{{ matrix }}{% endif %}</textarea
                >
              </div>
            </form>
          </td>
        </tr>
        <tr>
          <td style="font-weight: bold; color: blue">ENCRYPTION</td>
        </tr>
        <tr>
          <td>
            <form method="POST" action="/playfair/encrypt">
              <div class="mb-3">
                <label class="form-label">Plain text:</label>
                <input
                  type="text"
                  class="form-control"
                  name="inputPlainText"
                  placeholder="e.g. hutech"
                  required
                  autofocus
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Key:</label>
                <input
                  type="text"
                  class="form-control"
                  name="inputKeyPlain"
                  placeholder="Input Key"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary">Encrypt</button>
              <div class="mt-3">
                <label class="form-label text-primary font-weight-bold"
                  >Kết quả mã hóa:</label
                >
                <textarea
                  class="form-control font-weight-bold text-primary"
                  rows="4"
                  style="background-color: #f8f9fa"
                  readonly
                >
{% if action == 'encrypt' %}Plain text: {{ text }}
Key (raw): {{ key }}
Key (cleaned): {{ cleaned_key }}
Encrypted text: {{ result }}{% endif %}</textarea
                >
              </div>
            </form>
          </td>
        </tr>

        <tr>
          <td style="font-weight: bold; color: blue">DECRYPTION</td>
        </tr>
        <tr>
          <td>
            <form method="POST" action="/playfair/decrypt">
              <div class="mb-3">
                <label class="form-label">Cipher text:</label>
                <input
                  type="text"
                  class="form-control"
                  name="inputCipherText"
                  placeholder="Input Cipher Text"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Key:</label>
                <input
                  type="text"
                  class="form-control"
                  name="inputKeyCipher"
                  placeholder="Input Key"
                  required
                />
              </div>
              <button type="submit" class="btn btn-success">Decrypt</button>
              <div class="mt-3">
                <label class="form-label text-success font-weight-bold"
                  >Kết quả giải mã:</label
                >
                <textarea
                  class="form-control font-weight-bold text-success"
                  rows="4"
                  style="background-color: #f8f9fa"
                  readonly
                >
{% if action == 'decrypt' %}Cipher text: {{ text }}
Key (raw): {{ key }}
Key (cleaned): {{ cleaned_key }}
Decrypted text: {{ result }}{% endif %}</textarea
                >
              </div>
            </form>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <table class="table">
            <tr><td style="text-align: center; font-weight: bold; font-size: 25px;">Vigenere CIPHER</td></tr>
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/vigenere/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="text" class="form-control" name="inputKeyPlain" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-primary">Encrypt</button>
                        <div class="mt-3">
                            <label class="form-label text-primary font-weight-bold">Kết quả mã hóa:</label>
                            <textarea class="form-control font-weight-bold text-primary" rows="4" style="background-color: #f8f9fa;" readonly>{% if action == 'encrypt' %}Plain text: {{ text }}
                        Key: {{ key }}
                        Encrypted text: {{ result }}{% endif %}</textarea>
                        </div>
                    </form>
                </td>
            </tr>

            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/vigenere/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="text" class="form-control" name="inputKeyCipher" placeholder="Input Key" required/>
                        </div>
                        <button type="submit" class="btn btn-success">Decrypt</button>
                        <div class="mt-3">
                            <label class="form-label text-success font-weight-bold">Kết quả giải mã:</label>
                            <textarea class="form-control font-weight-bold text-success" rows="4" style="background-color: #f8f9fa;" readonly>{% if action == 'decrypt' %}Cipher text: {{ text }}
                        Key: {{ key }}
                        Decrypted text: {{ result }}{% endif %}</textarea>
                        </div>
                    </form>          
                </tr>
        </table>
    </div>
</body>
</html>
